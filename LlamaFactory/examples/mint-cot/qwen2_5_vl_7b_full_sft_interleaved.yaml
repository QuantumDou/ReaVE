### model
model_name_or_path: /cephfs/volumes/hpc_data_prj/proj_loukides/bde7318a-93a3-4cd6-90a4-9007857ac4ea/haodi/TIAN/huggingface/Qwen2.5-VL-7B-Instruct
cache_dir: /cephfs/volumes/hpc_data_prj/proj_loukides/bde7318a-93a3-4cd6-90a4-9007857ac4ea/haodi/TIAN/huggingface
# 2. 建议开启，否则 7B 全量微调显存压力极大
flash_attn: fa2

### image resolution (MINT-CoT 标准配置，用于医学图像高分辨率处理)
image_max_pixels: 54880  #1003520  # 1280 * 28 * 28，MINT-CoT 原始配置
image_min_pixels: 1024     # 32 * 32

### method
stage: sft
do_train: true
finetuning_type: full
# deepspeed: examples/deepspeed/ds_z2_config.json
deepspeed: examples/deepspeed/ds_z2_config.json


### dataset
dataset: mulberry_54k_interleave_ra
template: qwen2_vl  # 使用 qwen2_vl 模板（兼容 Qwen2.5-VL）
default_system: "You are an expert Radiologist. Analyze X-ray images and output Diagnostic Report. You must strictly follow the user-provided formatting template and diagnostic logic."  # 覆盖默认系统消息
cutoff_len: 4096   #32768
overwrite_cache:  true #true   # 👈 修改：单卡跑通后，多卡直接读，不覆盖
preprocessing_num_workers: 32 #32
dataloader_num_workers:  8 #8
dataset_dir: data
media_dir: /cephfs/volumes/hpc_data_prj/proj_loukides/bde7318a-93a3-4cd6-90a4-9007857ac4ea/haodi/TIAN/mimic_cxr/files/

### output
output_dir: /cephfs/volumes/hpc_data_prj/proj_loukides/bde7318a-93a3-4cd6-90a4-9007857ac4ea/haodi/TIAN/qwen2.5/saves/7b_full_dataset
logging_steps: 100 #1000
save_steps: 9999
save_only_model: true
save_strategy: 'epoch'
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 1  #4 #1
gradient_accumulation_steps: 2 #2
learning_rate: 5.0e-6
num_train_epochs: 4
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
ddp_timeout: 180000000


#快速测试设置
